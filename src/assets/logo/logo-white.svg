<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 150" width="100%" height="100%">
  <defs>
    <!-- Brand Gradients -->
    <linearGradient id="goldGradWhite" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="50%" stop-color="#FBBF24" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="steelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A5F" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
  </defs>

  <!-- Logo Icon -->
  <g transform="translate(10, 5)">
    <!-- Hexagonal Shield Outer -->
    <polygon points="70,10 120,40 120,100 70,130 20,100 20,40" fill="url(#steelGrad)" />
    <!-- Hexagonal Inner Gold Accent -->
    <polygon points="70,20 110,45 110,95 70,120 30,95 30,45" fill="none" stroke="url(#goldGradWhite)" stroke-width="4" />
    <!-- Lettering DP inside Icon -->
    <path d="M50,45 L78,45 C90,45 96,51 96,59 C96,67 90,72 78,72 L50,72 Z" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linejoin="round" />
    <path d="M50,72 L50,100 M50,72 L78,72 C90,72 96,78 96,86 C96,94 90,100 78,100 L50,100" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linejoin="round" />
    <!-- Small electrical lightning symbol -->
    <path d="M70,55 L60,75 L73,75 L65,93" fill="none" stroke="url(#goldGradWhite)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Brand Typography -->
  <g transform="translate(150, 85)">
    <!-- DPGOLD -->
    <text font-family="'Poppins', 'Inter', sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" letter-spacing="3">DP<tspan fill="url(#goldGradWhite)">GOLD</tspan></text>
    <!-- Subtitle: PRODUCTS (DINESH PLASTICS) -->
    <text y="35" font-family="'Inter', sans-serif" font-weight="600" font-size="16" fill="#94A3B8" letter-spacing="5">PRODUCTS | DINESH PLASTICS</text>
  </g>
</svg>
